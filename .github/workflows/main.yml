name: Meteo Matin
on:
  schedule:
    - cron: '0 4,5 * * *' # 6h et 7h du matin en Suisse
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install requests
        run: pip install requests
      - name: Run script
        run: python weather_bot.py
